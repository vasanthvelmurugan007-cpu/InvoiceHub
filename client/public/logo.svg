<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with Gradient and Rounded Corners -->
  <rect x="32" y="32" width="448" height="448" rx="120" ry="120" fill="url(#grad)" filter="url(#shadow)" />
  
  <!-- Stylized 'IH' Monogram -->
  <g transform="translate(100, 100) scale(0.6)">
    <!-- I bar -->
    <rect x="100" y="50" width="80" height="400" rx="40" fill="white" />
    <!-- H bars -->
    <rect x="340" y="50" width="80" height="400" rx="40" fill="white" />
    <rect x="180" y="210" width="160" height="80" rx="20" fill="white" />
  </g>
</svg>
